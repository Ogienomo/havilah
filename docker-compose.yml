# Havilah OS — Docker Compose Configuration
# Production-ready setup with PostgreSQL, Redis, and the Havilah OS API

version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${HAVILAH_DB_NAME:-havilah}
      POSTGRES_USER: ${HAVILAH_DB_USER:-havilah_app}
      POSTGRES_PASSWORD: ${HAVILAH_DB_PASSWORD:-Havilah2026!}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HAVILAH_DB_USER:-havilah_app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Havilah OS API ───────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      HAVILAH_ENV: ${HAVILAH_ENV:-production}
      HAVILAH_SECRET_KEY: ${HAVILAH_SECRET_KEY:?Set HAVILAH_SECRET_KEY}
      HAVILAH_DB_HOST: db
      HAVILAH_DB_PORT: 5432
      HAVILAH_DB_NAME: ${HAVILAH_DB_NAME:-havilah}
      HAVILAH_DB_USER: ${HAVILAH_DB_USER:-havilah_app}
      HAVILAH_DB_PASSWORD: ${HAVILAH_DB_PASSWORD:-Havilah2026!}
      HAVILAH_DEBUG: "false"
      HAVILAH_WHATSAPP_ENABLED: ${HAVILAH_WHATSAPP_ENABLED:-false}
      HAVILAH_WHATSAPP_VERIFY_TOKEN: ${HAVILAH_WHATSAPP_VERIFY_TOKEN:-}
      HAVILAH_WHATSAPP_ACCESS_TOKEN: ${HAVILAH_WHATSAPP_ACCESS_TOKEN:-}
      HAVILAH_WHATSAPP_PHONE_NUMBER_ID: ${HAVILAH_WHATSAPP_PHONE_NUMBER_ID:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
